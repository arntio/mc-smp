name: Publish image

# When a release is published, build the standalone image and push it to GHCR
# tagged with the release version and `latest`.
on:
  release:
    types: [published]

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        run: |
          ./build.sh --push \
            --platform linux/amd64,linux/arm64 \
            -t "ghcr.io/arntio/mc-smp:${{ github.event.release.tag_name }}" \
            -t "ghcr.io/arntio/mc-smp:latest" \
            .
