name: Release

# On merge to main (when the locked content or build changes), cut a dated
# release with a changelog. Publishing the release triggers the image build.
on:
  push:
    branches: [main]
    paths:
      - manifest.lock
      - Dockerfile
      - assets/**
      - tools/**

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: tools/go.sum

      - name: Compute CalVer tag
        id: tag
        run: |
          base="v$(date -u +'%Y.%m.%d')"
          tag="$base"; n=0
          while git rev-parse "$tag" >/dev/null 2>&1; do n=$((n + 1)); tag="$base.$n"; done
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Generate notes
        run: |
          # Same version-diff table the auto-update PR carried: compare the
          # previous release's lock against the one being released.
          prev=$(git describe --tags --abbrev=0 2>/dev/null || true)
          : > old.lock
          if [ -n "$prev" ]; then
            git show "$prev:manifest.lock" > old.lock 2>/dev/null || : > old.lock
          fi
          table=$(cd tools && go run . diff --old "$GITHUB_WORKSPACE/old.lock" --new ../manifest.lock)
          {
            echo "$table"
            echo "## Run"
            echo '```'
            echo "docker pull ghcr.io/arntio/mc-smp:${{ steps.tag.outputs.tag }}"
            echo '```'
          } > notes.md

      - name: Create release
        env:
          # PAT/App token (NOT github.token): releases created by the default
          # GITHUB_TOKEN cannot trigger the publish-image `on: release` workflow.
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          gh release create "${{ steps.tag.outputs.tag }}" \
            --title "${{ steps.tag.outputs.tag }}" \
            --notes-file notes.md \
            assets/snake_logo.png
