name: Release

# On merge to main (when the locked content or build changes), cut a dated
# release with a changelog. Publishing the release triggers the image build.
on:
  push:
    branches: [main]
    paths:
      - manifest.lock
      - Dockerfile
      - assets/**
      - tools/**

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute CalVer tag
        id: tag
        run: |
          base="v$(date -u +'%Y.%m.%d')"
          tag="$base"; n=0
          while git rev-parse "$tag" >/dev/null 2>&1; do n=$((n + 1)); tag="$base.$n"; done
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Generate notes
        run: |
          prev=$(git describe --tags --abbrev=0 2>/dev/null || true)
          {
            echo "## Changes"
            if [ -n "$prev" ]; then
              git log --pretty='- %s' "$prev"..HEAD
            else
              git log --pretty='- %s'
            fi
            echo
            echo "## Run"
            echo '```'
            echo "docker pull ghcr.io/arntio/mc-smp:${{ steps.tag.outputs.tag }}"
            echo '```'
          } > notes.md

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.tag.outputs.tag }}" \
            --title "${{ steps.tag.outputs.tag }}" \
            --notes-file notes.md \
            assets/snake_logo.png
